<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kasir</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card" id="login-section">
    <h2>Login Kasir</h2>
    <label for="username"></label><input type="text" id="username" placeholder="Username (isi: kasir)">
    <label for="password"></label><input type="password" id="password" placeholder="Password (isi: 123)">
    <button onclick="login()">Masuk</button>
    <p id="login-error" style="color: red;"></p>
</div>

<div class="card hidden" id="dashboard-section">
    <h2>Selamat datang, Kasir!</h2>
    <button class="btn-danger" onclick="logout()">Logout</button>
    <hr>

    <h3>Tambah Menu Baru</h3>
    <label for="nama-menu"></label><input type="text" id="nama-menu" placeholder="Nama Menu">
    <label for="harga-menu"></label><input type="number" id="harga-menu" placeholder="Harga (Rp)">
    <button onclick="tambahMenu()">Simpan Menu</button>
    <p id="form-pesan"></p>
</div>

<div class="card">
    <h2>Daftar Menu</h2>
    <button class="btn-primary" onclick="loadMenu()">Refresh Data</button>
    <ul id="list-menu">
        <li>Memuat data...</li>
    </ul>
</div>

<script src="script.js"></script>

</body>
</html>
